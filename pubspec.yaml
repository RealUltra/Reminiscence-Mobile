name: reminiscence
description: "An app to revisit old Instagram messages."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  archive: ^4.0.7
  crypto: ^3.0.6
  path: ^1.9.1
  sqflite: ^2.4.2
  file_picker: ^10.1.2
  path_provider: ^2.1.5
  permission_handler: ^12.0.0+1
  drift: ^2.26.1
  sqlcipher_flutter_libs: ^0.6.6
  cryptography: ^2.7.0
  sqlite3: ^2.7.5
  collection: ^1.19.1
  shared_preferences: ^2.5.3

  receive_sharing_intent:
    git:
      url: https://github.com/KasemJaffer/receive_sharing_intent
      ref: 2cea396843cd3ab1b5ec4334be4233864637874e

  intl: ^0.20.2
  video_player: ^2.10.0
  change_app_package_name: ^1.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  drift_dev: ^2.26.1
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon.png"

  adaptive_icon_foreground: "assets/icon.png"
  adaptive_icon_background: "assets/launcher_icon_background.png"
  adaptive_icon_foreground_inset: 27
