<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Data Loader - No Recent Files</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      background: #121212;
      font-family: 'Inter', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .phone-container {
      width: 390px;
      height: 844px;
      background: #1E1E1E;
      box-shadow:
        0 15px 30px rgba(0,0,0,0.8),
        inset 0 0 2px #444;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    /* Remove horizontal padding from container to allow full width app-bar */
    .app-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      color: #eee;
      padding: 0 0 80px; /* remove horizontal padding */
      overflow: hidden;
    }
    /* App Bar full width */
    header.app-bar {
      width: 100%;
      height: 64px;
      background: #242424;
      display: flex;
      align-items: center;
      padding-left: 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.6);
      user-select: none;
      position: relative;
      z-index: 5;
      box-sizing: border-box;
    }
    header.app-bar h1 {
      font-weight: 600;
      font-size: 20px;
      margin: 0;
      color: #e0e0e0;
      letter-spacing: 0.04em;
      line-height: 64px; /* vertically center text */
      flex-grow: 1;
    }
    .content-area {
      flex: 1;
      overflow-y: auto;
      margin-top: 40px;
      padding: 0 24px 0 24px; /* add horizontal padding here */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: start;
    }
    .btn-load-file {
      background: linear-gradient(135deg, #3a8dff, #005eff);
      border: none;
      border-radius: 14px;
      padding: 16px 0;
      font-weight: 600;
      font-size: 18px;
      color: white;
      cursor: default;
      user-select: none;
      box-shadow: 0 3px 10px rgba(58, 141, 255, 0.6);
      margin-bottom: 60px;
      width: 100%;
      text-align: center;
      transition: box-shadow 0.3s ease;
    }
    .btn-load-file:hover {
      box-shadow: 0 5px 18px rgba(58, 141, 255, 0.9);
    }
    .empty-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      max-width: 280px;
      user-select: none;
      text-align: center;
      color: #888;
      font-size: 16px;
      line-height: 1.5;
    }
    .empty-icon {
      width: 96px;
      height: 96px;
      fill: #555;
      opacity: 0.7;
    }
  </style>
</head>
<body>
  <div class="phone-container" role="main" aria-label="Data loader app">
    <div class="app-content">
      <header class="app-bar" role="banner">
        <h1>Data Loader</h1>
      </header>
      <main class="content-area" tabindex="0" aria-label="Main content area">
        <button class="btn-load-file" tabindex="-1">Load New File</button>
        <div class="empty-wrapper" aria-live="polite">
          <svg class="empty-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" aria-hidden="true" role="img" aria-label="Empty file list icon">
            <rect x="8" y="12" width="48" height="40" rx="6" ry="6" fill="#555" stroke="#777" stroke-width="2"/>
            <rect x="24" y="22" width="16" height="4" fill="#888" />
            <rect x="24" y="30" width="16" height="4" fill="#888" />
            <rect x="24" y="38" width="16" height="4" fill="#888" />
            <circle cx="32" cy="54" r="6" fill="#777" />
          </svg>
          <p>No recent files found.<br />Use the "Load New File" button above to add your first file.</p>
        </div>
      </main>
    </div>
  </div>
</body>
</html>
